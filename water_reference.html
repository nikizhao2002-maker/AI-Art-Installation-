<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Ripple Effect - Three.js & MediaPipe</title>
    
    <!-- MediaPipe Hands (Legacy CDN scripts) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a12; /* Dark background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        #fps {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 10px;
        }

        .controls {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        .highlight {
            color: #fff;
            font-weight: bold;
        }

        #camera-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid rgba(0, 255, 204, 0.5);
            border-radius: 8px;
            z-index: 10;
            background: #000;
            transform: scaleX(-1); /* Mirror camera */
            object-fit: cover;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #00ffcc;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            transition: opacity 0.5s;
        }
    </style>

    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="ui-container">
        <div id="fps">FPS: 0</div>
        <div class="controls">
            <div><span class="highlight">Click / Hand</span> : Add Ripple</div>
            <div><span class="highlight">R Key</span> : Center Ripple</div>
            <div><span class="highlight">+/- Keys</span> : Distortion (<span id="dist-val">1.0</span>)</div>
        </div>
    </div>

    <div id="loading">Initializing MediaPipe & Three.js...</div>

    <!-- Hidden video element for camera feed, visible preview -->
    <video id="camera-preview" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        scene.fog = new THREE.FogExp2(0x0a0a12, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Post-processing handles AA usually, keeping it fast
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Animated Scene Objects (to make distortion obvious)
        const objects = [];
        const geometries = [
            new THREE.IcosahedronGeometry(1.5, 1),
            new THREE.TorusKnotGeometry(1.2, 0.4, 64, 16),
            new THREE.OctahedronGeometry(1.5, 0)
        ];
        
        // Bright, neon colors for clear bloom and refraction
        const colors = [0xff0055, 0x00ffcc, 0xffaa00, 0xaa00ff, 0x0088ff];

        for (let i = 0; i < 40; i++) {
            const geo = geometries[Math.floor(Math.random() * geometries.length)];
            const mat = new THREE.MeshStandardMaterial({
                color: colors[Math.floor(Math.random() * colors.length)],
                emissive: colors[Math.floor(Math.random() * colors.length)],
                emissiveIntensity: 0.8,
                roughness: 0.2,
                metalness: 0.8
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.set(
                (Math.random() - 0.5) * 40,
                (Math.random() - 0.5) * 30,
                (Math.random() - 0.5) * 20 - 5
            );
            
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            
            mesh.userData = {
                rx: (Math.random() - 0.5) * 0.02,
                ry: (Math.random() - 0.5) * 0.02,
                py: (Math.random() - 0.5) * 0.01 + 0.01
            };
            
            objects.push(mesh);
            scene.add(mesh);
        }

        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. WATER RIPPLE SHADER PASS ---
        const WaterRippleShader = {
            name: 'WaterRippleShader',
            uniforms: {
                'tDiffuse': { value: null },
                'uTime': { value: 0.0 },
                'uDistortionStrength': { value: 1.0 },
                'uResolution': { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                'uRipples': { value: [
                    new THREE.Vector3(0,0,99), new THREE.Vector3(0,0,99), 
                    new THREE.Vector3(0,0,99), new THREE.Vector3(0,0,99), 
                    new THREE.Vector3(0,0,99)
                ]}
            },
            vertexShader: /* glsl */`
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: /* glsl */`
                uniform sampler2D tDiffuse;
                uniform float uTime;
                uniform float uDistortionStrength;
                uniform vec2 uResolution;
                uniform vec3 uRipples[5]; // x, y, age

                varying vec2 vUv;

                // Hash and Voronoi for Caustics
                vec2 hash2(vec2 p) {
                    p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
                    return fract(sin(p)*43758.5453123);
                }

                float voronoi(vec2 x) {
                    vec2 n = floor(x);
                    vec2 f = fract(x);
                    float res = 8.0;
                    for(int j=-1; j<=1; j++)
                    for(int i=-1; i<=1; i++) {
                        vec2 b = vec2(float(i), float(j));
                        vec2 p = b - f + hash2(n + b);
                        float d = dot(p, p);
                        res = min(res, d);
                    }
                    return sqrt(res);
                }

                void main() {
                    vec2 uv = vUv;
                    float aspect = uResolution.x / uResolution.y;

                    // 1. Ambient Distortion (3 Layers)
                    vec2 dist = vec2(0.0);
                    float t = uTime;
                    
                    // Layer 1: low freq, slow
                    dist.x += sin(uv.y * 5.0 + t * 0.6) * 0.015;
                    dist.y += cos(uv.x * 5.0 + t * 0.6) * 0.015;
                    // Layer 2: med freq, med speed
                    dist.x += sin(uv.y * 11.0 - t * 1.2) * 0.008;
                    dist.y += cos(uv.x * 11.0 - t * 1.2) * 0.008;
                    // Layer 3: high freq, fast
                    dist.x += sin(uv.y * 20.0 + t * 1.8) * 0.003;
                    dist.y += cos(uv.x * 20.0 + t * 1.8) * 0.003;
                    
                    dist *= uDistortionStrength;

                    // 2. Interactive Ripples
                    vec2 rippleDist = vec2(0.0);
                    float causticBoost = 0.0;
                    
                    for(int i=0; i<5; i++) {
                        float age = uRipples[i].z;
                        if(age < 4.0) { // Active lifetime
                            vec2 center = uRipples[i].xy;
                            vec2 dir = uv - center;
                            dir.x *= aspect; // Correct for screen aspect ratio
                            
                            float d = length(dir);
                            float ring = abs(d - age * 0.35); // Expanding radius 0.35/s
                            
                            // Ring distortion formula from prompt
                            float wave = sin(ring * 50.0 - age * 8.0) * exp(-ring * 6.0);
                            
                            // Decay over lifetime
                            float decay = max(0.0, 1.0 - (age / 4.0));
                            float strength = 0.04 * wave * decay * uDistortionStrength;
                            
                            if(d > 0.001) {
                                rippleDist += normalize(dir) * strength;
                            }
                            causticBoost += abs(strength) * 20.0;
                        }
                    }

                    vec2 finalUv = uv + dist + rippleDist;

                    // 3. Chromatic Aberration
                    float baseAberration = 0.003;
                    float totalAberration = baseAberration * uDistortionStrength + length(rippleDist) * 0.3;
                    
                    vec2 centerDist = finalUv - 0.5;
                    vec2 rUv = finalUv + centerDist * totalAberration;
                    vec2 gUv = finalUv;
                    vec2 bUv = finalUv - centerDist * totalAberration;

                    vec3 color;
                    color.r = texture2D(tDiffuse, rUv).r;
                    color.g = texture2D(tDiffuse, gUv).g;
                    color.b = texture2D(tDiffuse, bUv).b;

                    // 4. Caustic Light Patterns
                    vec2 cauv = finalUv * 3.0 + vec2(t * 0.1);
                    float v1 = voronoi(cauv * 2.0);
                    float v2 = voronoi(cauv * 4.0 + vec2(t * 0.2));
                    
                    float caustic = max(0.0, 1.0 - (v1 * 0.5 + v2 * 0.5));
                    caustic = pow(caustic, 4.0); // Sharp sparkle highlights
                    
                    vec3 causticColor = vec3(0.3, 0.6, 0.9);
                    float causticIntensity = clamp(0.3 + causticBoost, 0.3, 0.8);
                    color += causticColor * caustic * causticIntensity * uDistortionStrength;

                    // 5. Color Tint (Underwater shift)
                    color *= mix(vec3(1.0), vec3(0.75, 0.9, 1.15), 0.4);
                    color += vec3(0.05, 0.15, 0.3) * 0.1;

                    // 6. Vignette
                    float vig = length(vUv - 0.5) * 2.0;
                    vig = 1.0 - smoothstep(0.4, 1.5, vig);
                    color *= mix(0.6, 1.0, vig); // 0.4 strength

                    gl_FragColor = vec4(color, 1.0);
                }
            `
        };

        // --- 3. EFFECT COMPOSER PIPELINE ---
        const composer = new EffectComposer(renderer);
        
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const customWaterPass = new ShaderPass(WaterRippleShader);
        composer.addPass(customWaterPass);

        // UnrealBloomPass(resolution, strength, radius, threshold)
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.8);
        composer.addPass(bloomPass);

        const outputPass = new OutputPass();
        composer.addPass(outputPass);

        // --- 4. RIPPLE MANAGEMENT ---
        let distortionStrength = 1.0;
        const distEl = document.getElementById('dist-val');
        
        function addRipple(x, y) {
            const ripples = customWaterPass.uniforms.uRipples.value;
            // Find oldest ripple to replace
            let oldestIdx = 0;
            let maxAge = -1;
            for(let i = 0; i < 5; i++) {
                if(ripples[i].z > maxAge) {
                    maxAge = ripples[i].z;
                    oldestIdx = i;
                }
            }
            // Add new ripple (x, y, age)
            ripples[oldestIdx].set(x, y, 0.0);
        }

        // --- 5. INTERACTION & EVENTS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            customWaterPass.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('click', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = 1.0 - (e.clientY / window.innerHeight); // WebGL y is inverted
            addRipple(x, y);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                addRipple(0.5, 0.5); // Center
            } else if (e.key === '=' || e.key === '+') {
                distortionStrength = Math.min(3.0, distortionStrength + 0.2);
                customWaterPass.uniforms.uDistortionStrength.value = distortionStrength;
                distEl.innerText = distortionStrength.toFixed(1);
            } else if (e.key === '-' || e.key === '_') {
                distortionStrength = Math.max(0.0, distortionStrength - 0.2);
                customWaterPass.uniforms.uDistortionStrength.value = distortionStrength;
                distEl.innerText = distortionStrength.toFixed(1);
            }
        });

        // --- 6. MEDIAPIPE HANDS SETUP ---
        const videoElement = document.getElementById('camera-preview');
        let lastHandRippleTime = 0;

        function onResults(results) {
            // Remove loading text on first successful result
            const loadingEl = document.getElementById('loading');
            if(loadingEl && loadingEl.style.opacity !== '0') {
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.remove(), 500);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexFingerTip = landmarks[8];
                
                const now = performance.now();
                // Throttle to every 0.5 seconds
                if (now - lastHandRippleTime > 500) {
                    // Map MediaPipe coords to screen WebGL coords
                    // Video is mirrored to user, so 1.0 - x. WebGL y is 1.0 - y.
                    const rx = 1.0 - indexFingerTip.x;
                    const ry = 1.0 - indexFingerTip.y;
                    
                    addRipple(rx, ry);
                    lastHandRippleTime = now;
                }
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraFeed.start().catch(err => {
            console.warn("Camera access denied or unavailable. Fallback to mouse interactions.");
            document.getElementById('loading').innerText = "Camera not detected. Use mouse/keyboard.";
            setTimeout(() => document.getElementById('loading').style.opacity = '0', 3000);
        });


        // --- 7. ANIMATION LOOP ---
        const clock = new THREE.Clock();
        const fpsEl = document.getElementById('fps');
        let frames = 0;
        let lastFpsTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Animate Objects
            objects.forEach((obj, idx) => {
                obj.rotation.x += obj.userData.rx;
                obj.rotation.y += obj.userData.ry;
                obj.position.y += Math.sin(time + idx) * obj.userData.py;
            });

            // Update Shader Uniforms
            customWaterPass.uniforms.uTime.value = time;
            
            // Update Ripple Ages
            const ripples = customWaterPass.uniforms.uRipples.value;
            for(let i = 0; i < 5; i++) {
                if(ripples[i].z < 100.0) { // If active
                    ripples[i].z += delta; // Increase age
                }
            }

            // Render Pipeline
            composer.render();

            // FPS Counter
            frames++;
            const now = performance.now();
            if (now >= lastFpsTime + 1000) {
                fpsEl.innerText = `FPS: ${Math.round((frames * 1000) / (now - lastFpsTime))}`;
                frames = 0;
                lastFpsTime = now;
            }
        }

        // Start Loop
        animate();
    </script>
</body>
</html>
