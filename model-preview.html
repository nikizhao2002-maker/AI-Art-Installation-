<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮金鱼影 - 3D 模型预览</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #07090d;
            color: #f4ead3;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
        }
        #scene {
            position: fixed;
            inset: 0;
        }
        .hud {
            position: fixed;
            left: 24px;
            bottom: 24px;
            max-width: min(420px, calc(100vw - 48px));
            pointer-events: none;
        }
        h1 {
            margin: 0 0 8px;
            font-size: clamp(28px, 5vw, 54px);
            font-weight: 600;
            letter-spacing: 0;
            color: #f0c866;
            text-shadow: 0 0 28px rgba(240, 200, 102, 0.28);
        }
        p {
            margin: 0;
            font-size: 14px;
            line-height: 1.7;
            color: rgba(244, 234, 211, 0.68);
        }
        .status {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            min-width: min(360px, calc(100vw - 48px));
            padding: 18px 20px;
            border: 1px solid rgba(240, 200, 102, 0.22);
            background: rgba(7, 9, 13, 0.78);
            backdrop-filter: blur(14px);
            border-radius: 8px;
            color: rgba(244, 234, 211, 0.84);
            text-align: center;
        }
        .status strong {
            display: block;
            margin-bottom: 8px;
            color: #f0c866;
            font-size: 16px;
        }
        .status.is-hidden {
            display: none;
        }
        .meter {
            width: 100%;
            height: 4px;
            margin-top: 14px;
            overflow: hidden;
            border-radius: 99px;
            background: rgba(244, 234, 211, 0.12);
        }
        .meter span {
            display: block;
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #a5d8ff, #f0c866, #ff8f70);
            transition: width 0.18s ease;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="scene"></div>
    <div class="status" id="status">
        <strong>正在加载浮金鱼影</strong>
        <span id="status-text">准备模型文件...</span>
        <div class="meter" aria-hidden="true"><span id="meter"></span></div>
    </div>
    <div class="hud">
        <h1>浮金鱼影</h1>
        <p>拖动旋转，滚轮缩放。模型来自仓库 <span>assets/models/浮金鱼影tripo.glb</span>。</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.getElementById('scene');
        const status = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const meter = document.getElementById('meter');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x07090d);
        scene.fog = new THREE.FogExp2(0x07090d, 0.032);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1.4, 4.6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.25;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.target.set(0, 0.65, 0);

        scene.add(new THREE.HemisphereLight(0xcde7ff, 0x25130a, 2.1));
        const key = new THREE.DirectionalLight(0xffe0a1, 3.2);
        key.position.set(3.5, 4.2, 3.2);
        scene.add(key);
        const rim = new THREE.DirectionalLight(0x80d8ff, 2.4);
        rim.position.set(-3.6, 2.4, -3.2);
        scene.add(rim);

        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(4.2, 96),
            new THREE.MeshBasicMaterial({
                color: 0x10202c,
                transparent: true,
                opacity: 0.42,
                depthWrite: false
            })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.03;
        scene.add(floor);

        const loader = new GLTFLoader();
        const modelUrl = new URL('./assets/models/浮金鱼影tripo.glb', window.location.href).href;

        loader.load(
            modelUrl,
            (gltf) => {
                const model = gltf.scene;
                scene.add(model);

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z) || 1;
                const scale = 2.5 / maxDim;

                model.position.sub(center);
                model.scale.setScalar(scale);
                model.rotation.y = -0.45;

                controls.target.set(0, 0, 0);
                camera.position.set(0, 0.55, 4.2);
                controls.update();

                status.classList.add('is-hidden');
            },
            (event) => {
                if (!event.total) {
                    statusText.textContent = '正在下载模型...';
                    return;
                }
                const progress = Math.round((event.loaded / event.total) * 100);
                statusText.textContent = `${progress}%`;
                meter.style.width = `${progress}%`;
            },
            (error) => {
                console.error(error);
                status.querySelector('strong').textContent = '模型加载失败';
                statusText.textContent = '请确认 GitHub Pages 已部署，且模型文件路径存在。';
            }
        );

        function resize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', resize);
        animate();
    </script>
</body>
</html>
